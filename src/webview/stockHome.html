<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; script-src 'nonce-{{NONCE}}';"
    />
    <title>查看股票</title>
    <style>
      :root {
        /* 基础颜色 */
        --c-up: #c94c4c;
        --c-dn: #2d8a2d;
        --c-grid: rgba(128, 128, 128, 0.18);
        --c-bdr: rgba(128, 128, 128, 0.3);
        --c-axis: var(--vscode-descriptionForeground, #888);
        --c-ch: rgba(140, 140, 140, 0.5);

        /* 透明度语义化：用于成交量柱状图和面积图 */
        --op-vol-up: 1; /* 彩色模式下直接用颜色区分涨跌，不加透明度 */
        --op-vol-dn: 1;
        --op-area: 0.25; /* 面积图渐变起始透明度 */
        --op-area-end: 0.02; /* 面积图渐变结束透明度 */
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--vscode-editor-background);
        color: var(--vscode-editor-foreground);
        font-family: var(--vscode-font-family, -apple-system);
        font-size: 13px;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: auto;
      }

      /* 黑白模式（未开启彩色视图）：涨跌统一使用编辑器默认前景色 */
      body.mono {
        --c-up: var(--vscode-editor-foreground);
        --c-dn: var(--vscode-editor-foreground);
        --op-vol-up: 0.9; /* 黑白模式下凭明暗区分涨跌：涨柱深，跌柱浅 */
        --op-vol-dn: 0.4;
      }

      /* tab 栏 */
      .tab-bar {
        display: flex;
        background: var(--vscode-editorGroupHeader-tabsBackground, #252526);
        border-bottom: 1px solid var(--vscode-panel-border, #454545);
        overflow-x: auto;
        scrollbar-width: none;
        flex-shrink: 0;
      }

      .tab-bar::-webkit-scrollbar {
        display: none;
      }

      .tab {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 16px;
        cursor: pointer;
        border-right: 1px solid var(--vscode-panel-border, #454545);
        white-space: nowrap;
        color: var(--vscode-tab-inactiveForeground, #8c8c8c);
        background: var(--vscode-tab-inactiveBackground, #2d2d2d);
        border-top: 2px solid transparent;
        transition: background 0.15s ease;
        user-select: none;
      }

      .tab:hover {
        background: var(--vscode-tab-hoverBackground, #2a2d2e);
      }

      .tab.active {
        color: var(--vscode-tab-activeForeground, #ccc);
        background: var(--vscode-tab-activeBackground, #1e1e1e);
        border-top-color: var(--vscode-tab-activeBorderTop, #007acc);
      }

      .tab-name {
        font-weight: 500;
        font-size: 13px;
      }

      /* 主内容区 */
      .main {
        flex: 1;
        padding: 14px 16px 12px;
      }

      /* 统一宽度容器：600-1000px 自适应，>1000px 居中留白 */
      .content {
        min-width: 600px;
        max-width: 1000px;
        width: 100%;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      /* 通用颜色 */
      .up {
        color: var(--c-up);
      }

      .dn {
        color: var(--c-dn);
      }

      .gray {
        color: var(--c-axis);
      }

      .detail-backdrop {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: rgba(0, 0, 0, 0.42);
        z-index: 20;
      }

      .detail-dialog {
        width: min(920px, 100%);
        max-height: min(720px, calc(100vh - 48px));
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 14px;
        border: 1px solid var(--vscode-panel-border, #454545);
        border-radius: 6px;
        background: var(--vscode-editor-background);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.36);
        overflow: auto;
      }

      .detail-dialog-bar {
        display: flex;
        justify-content: flex-end;
      }

      .detail-close {
        width: 28px;
        height: 28px;
        border: 1px solid var(--vscode-panel-border, #454545);
        border-radius: 3px;
        background: none;
        color: var(--vscode-editor-foreground);
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
      }

      .detail-close:hover {
        background: var(--vscode-list-hoverBackground, #2a2d2e);
      }
    </style>
  </head>

  <body class="{{BODY_CLASS}}">
    <div class="tab-bar" id="tab-bar"></div>
    <div class="main">
      <div class="content" id="content">
        <!-- 自选概览 / A股全览区域（由 stockOverview.html 注入） -->
        <div id="overview-container">{{OVERVIEW_HTML}}</div>
      </div>
    </div>
    <div class="detail-backdrop" id="detail-backdrop">
      <div class="detail-dialog" role="dialog" aria-modal="true">
        <div class="detail-dialog-bar">
          <button class="detail-close" id="detail-close" title="关闭">×</button>
        </div>
        <div
          id="detail-container"
          style="display: none; flex-direction: column; gap: 10px"
        >
          {{DETAIL_HTML}}
        </div>
      </div>
    </div>

    <script nonce="{{NONCE}}">
      const vscode = acquireVsCodeApi();

      /* 是否开启彩色视图（false 时图表/文字均用编辑器默认前景色） */
      const IS_COLORFUL = "{{COLORFUL}}" === "true";

      /* ---- 状态 ---- */
      let stocks = [];
      let positions = [];
      let closedPositions = [];
      let indexStocks = [];
      let industryStocks = [];
      let candidates = [];
      let candidatesRefreshedAt = "";
      let strategyWatchResults = [];
      let strategyWatchRefreshedAt = "";
      let activeTab = "__watchlist__";
      let activeCode = null;
      const stocksMap = {};
      const quoteDataMap = {};
      let minuteData = null;
      let activeInfo = null;
      let activeQuote = null;

      /* ---- DOM 缓存 ---- */
      const $ = (id) => document.getElementById(id);
      const tabBar = $("tab-bar");
      const content = $("content");
      const overviewContainer = $("overview-container");
      const detailContainer = $("detail-container");
      const detailBackdrop = $("detail-backdrop");
      const detailClose = $("detail-close");

      /* ---- 通知 TS 端 webview 已就绪 ---- */
      vscode.postMessage({ type: "ready" });

      /* ---- 格式化工具函数 ---- */
      function fmtNum(n, d = 2) {
        return n == null || isNaN(n) ? "-" : Number(n).toFixed(d);
      }
      function fmtVol(n) {
        if (n == null || isNaN(n)) return "-";
        if (n >= 1e8) return (n / 1e8).toFixed(2) + "亿";
        if (n >= 1e4) return (n / 1e4).toFixed(2) + "万";
        return String(Math.round(n));
      }
      function fmtMoney(n) {
        if (n == null || isNaN(n)) return "-";
        if (n >= 1e12) return (n / 1e12).toFixed(2) + "万亿";
        if (n >= 1e8) return (n / 1e8).toFixed(2) + "亿";
        if (n >= 1e4) return (n / 1e4).toFixed(2) + "万";
        return Number(n).toFixed(2);
      }
      function escHtml(s) {
        const d = document.createElement("span");
        d.textContent = s;
        return d.innerHTML;
      }

      /* ---- 切换概览/详情容器 ---- */
      const overviewSectionIds = [
        "watchlist-wrap",
        "positions-wrap",
        "closed-positions-wrap",
        "candidates-wrap",
        "strategy-watch-wrap",
        "market-overview-wrap",
      ];

      function showOverviewSection(sectionId) {
        overviewContainer.style.display = "";
        closeDetail();
        for (const id of overviewSectionIds) {
          const el = $(id);
          if (el) el.style.display = id === sectionId ? "" : "none";
        }
      }

      function showWatchlist() {
        showOverviewSection("watchlist-wrap");
        renderWatchlistRows();
      }
      function showOverview() {
        showOverviewSection("market-overview-wrap");
        renderOverviewCards();
      }
      function showPositions() {
        showOverviewSection("positions-wrap");
        renderPositionRows();
      }
      function showClosedPositions() {
        showOverviewSection("closed-positions-wrap");
        renderClosedPositionRows();
      }
      function showCandidates() {
        showOverviewSection("candidates-wrap");
        renderCandidates();
      }
      function showStrategyWatch() {
        showOverviewSection("strategy-watch-wrap");
        renderStrategyWatch();
      }
      function showDetail() {
        detailBackdrop.style.display = "flex";
        detailContainer.style.display = "flex";
      }

      function closeDetail() {
        detailBackdrop.style.display = "none";
        detailContainer.style.display = "none";
        activeCode = null;
        minuteData = null;
      }

      detailClose.addEventListener("click", closeDetail);
      detailBackdrop.addEventListener("click", (e) => {
        if (e.target === detailBackdrop) closeDetail();
      });

      /* ---- 渲染 Tab ---- */
      tabBar.addEventListener("click", (e) => {
        const tab = e.target.closest(".tab");
        if (!tab) return;
        const c = tab.dataset.code;
        if (!c || c === activeTab) return;
        if (c === "__watchlist__") {
          activeTab = "__watchlist__";
          activeInfo = null;
          activeQuote = null;
          minuteData = null;
          renderTabs();
          showWatchlist();
        } else if (c === "__positions__") {
          activeTab = "__positions__";
          activeInfo = null;
          activeQuote = null;
          minuteData = null;
          renderTabs();
          showPositions();
        } else if (c === "__closed_positions__") {
          activeTab = "__closed_positions__";
          activeInfo = null;
          activeQuote = null;
          minuteData = null;
          renderTabs();
          showClosedPositions();
        } else if (c === "__candidates__") {
          activeTab = "__candidates__";
          activeInfo = null;
          activeQuote = null;
          minuteData = null;
          renderTabs();
          showCandidates();
        } else if (c === "__strategy_watch__") {
          activeTab = "__strategy_watch__";
          activeInfo = null;
          activeQuote = null;
          minuteData = null;
          renderTabs();
          showStrategyWatch();
        } else if (c === "__overview__") {
          activeTab = "__overview__";
          activeInfo = null;
          activeQuote = null;
          minuteData = null;
          renderTabs();
          showOverview();
        }
      });

      function switchToStock(code) {
        activeCode = code;
        minuteData = null;
        activeInfo = stocksMap[code] || null;
        activeQuote = quoteDataMap[code] || null;
        renderHeader();
        showDetail();
        vscode.postMessage({ type: "switchStock", code });
      }

      function renderTabs() {
        // 固定首个自选概览 tab，第二个为持仓 tab，第三个为已清除 tab
        const watchlistActive =
          activeTab === "__watchlist__" ? " active" : "";
        const positionsActive =
          activeTab === "__positions__" ? " active" : "";
        const closedPositionsActive =
          activeTab === "__closed_positions__" ? " active" : "";
        const candidatesActive =
          activeTab === "__candidates__" ? " active" : "";
        const strategyWatchActive =
          activeTab === "__strategy_watch__" ? " active" : "";
        const overviewActive = activeTab === "__overview__" ? " active" : "";
        const watchlistTab = `<div class="tab${watchlistActive}" data-code="__watchlist__"><span class="tab-name">自选</span></div>`;
        const positionsTab = `<div class="tab${positionsActive}" data-code="__positions__"><span class="tab-name">持仓</span></div>`;
        const closedPositionsTab = `<div class="tab${closedPositionsActive}" data-code="__closed_positions__"><span class="tab-name">已清除</span></div>`;
        const candidatesTab = `<div class="tab${candidatesActive}" data-code="__candidates__"><span class="tab-name">建仓候选</span></div>`;
        const strategyWatchTab = `<div class="tab${strategyWatchActive}" data-code="__strategy_watch__"><span class="tab-name">策略盯盘</span></div>`;
        const overviewTab = `<div class="tab${overviewActive}" data-code="__overview__"><span class="tab-name">A股全览</span></div>`;
        tabBar.innerHTML = watchlistTab + positionsTab + closedPositionsTab + candidatesTab + strategyWatchTab + overviewTab;
      }

      /* ---- 各片段 JS（由 stockOverview.html / stockDetail.html 的 <script> 提取注入） ---- */
      /* {{FRAGMENT_SCRIPTS}} */

      /* ---- 消息处理 ---- */
      window.addEventListener("message", (e) => {
        const msg = e.data;
        switch (msg.type) {
          case "init":
            stocks = msg.stocks;
            positions = msg.positions || [];
            closedPositions = msg.closedPositions || [];
            indexStocks = msg.indexStocks || [];
            industryStocks = msg.industryStocks || [];
            candidates = msg.candidates || [];
            candidatesRefreshedAt = msg.candidatesRefreshedAt || "";
            strategyWatchResults = msg.strategyWatchResults || [];
            strategyWatchRefreshedAt = msg.strategyWatchRefreshedAt || "";
            activeTab = "__watchlist__";
            activeCode = null;
            // 清空旧数据避免状态污染
            Object.keys(stocksMap).forEach((k) => delete stocksMap[k]);
            Object.keys(quoteDataMap).forEach((k) => delete quoteDataMap[k]);
            Object.assign(quoteDataMap, msg.quoteData || {});
            for (const s of stocks) stocksMap[s.code] = s;
            activeInfo = null;
            activeQuote = null;
            closeDetail();
            renderTabs();
            showWatchlist();
            break;
          case "loading":
            if (msg.code === activeCode) showLoading();
            break;
          case "minuteData":
            if (msg.code === activeCode) {
              minuteData = msg.data;
              activeInfo = msg.stockInfo || stocksMap[msg.code] || null;
              activeQuote = msg.quoteInfo || quoteDataMap[msg.code] || null;
              if (activeInfo) stocksMap[msg.code] = activeInfo;
              renderHeader();
              StockChart.render(minuteData, activeInfo);
            }
            break;
          case "indexData":
            indexStocks = msg.indexStocks || [];
            if (activeTab === "__overview__") renderOverviewCards();
            break;
          case "industryData":
            industryStocks = msg.industryStocks || [];
            if (activeTab === "__overview__") renderOverviewCards();
            break;
          case "candidateData":
            candidates = msg.candidates || [];
            candidatesRefreshedAt = msg.refreshedAt || "";
            if (activeTab === "__candidates__") renderCandidates();
            break;
          case "strategyWatchData":
            strategyWatchResults = msg.strategyWatchResults || [];
            strategyWatchRefreshedAt = msg.refreshedAt || "";
            if (activeTab === "__strategy_watch__") renderStrategyWatch();
            break;
        }
      });

      /* ---- 响应式 ResizeObserver ---- */
      let rafId = null;
      new ResizeObserver(() => {
        if (rafId) return;
        rafId = requestAnimationFrame(() => {
          rafId = null;
          if (minuteData) StockChart.render(minuteData, activeInfo);
        });
      }).observe(content);
    </script>
  </body>
</html>
